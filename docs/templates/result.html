<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>찬란운세소</title>
<style>
body {
    margin:0;
    height:100vh;
    background: radial-gradient(circle, #0f2027, #203a43, #2c5364);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family: 'Arial';
}
.card {
    background: rgba(255,255,255,0.1);
    padding:50px;
    border-radius:25px;
    text-align:center;
    backdrop-filter: blur(10px);
}
h1 {
    font-size:40px;
    margin-bottom:20px;
}
h2 {
    font-size:30px;
}
.stars {
    font-size:30px;
    margin:20px 0;
}
p {
    font-size:20px;
}
button {
    margin-top:25px;
    padding:12px 25px;
    font-size:16px;
    border:none;
    border-radius:10px;
    background:#a18cd1;
    color:white;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="card">
    <h1>🌌 찬란운세소</h1>
    <h2>{{name}}님의 운세</h2>

    <div class="stars">
        {% for i in range(stars) %}
            ⭐
        {% endfor %}
    </div>

    <p>{{fortune_title}}</p>
    <p>{{fortune_text}}</p>

    <p>
    {% if stars == 5 %}
        🔥 오늘은 인생급 찬란함!
    {% elif stars >= 3 %}
        ✨ 꽤 좋은 하루!
    {% else %}
        ⚠️ 조심하는 게 좋아요
    {% endif %}
    </p>

    <form action="/">
        <button>다시하기</button>
    </form>
</div>

</body>
</html>
