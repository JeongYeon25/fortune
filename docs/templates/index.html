<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>찬란운세소</title>
<style>
body {
    margin:0;
    height:100vh;
    background: radial-gradient(circle, #1a1a40, #000);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family: 'Arial';
}
.container {
    text-align:center;
}
h1 {
    font-size:50px;  /* ⭐ 크게 */
    margin-bottom:10px;
}
p {
    font-size:20px;
}
input {
    padding:15px;
    font-size:18px;
    border-radius:12px;
    border:none;
    margin-top:20px;
}
button {
    margin-top:25px;
    padding:15px 30px;
    font-size:18px;
    border:none;
    border-radius:15px;
    background: linear-gradient(45deg,#a18cd1,#fbc2eb);
    color:white;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="container">
    <h1>🌌 찬란운세소</h1>
    <p>당신의 운명을 확인하세요</p>

    <form action="/fortune" method="POST">
        <input type="text" name="name" placeholder="이름 입력" required><br>
        <button type="submit">운세 보기 ✨</button>
    </form>
</div>

</body>
</html>
