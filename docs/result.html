<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>운세 결과</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at top, #1a1a2e, #000000);
  overflow: hidden;
  font-family: 'Orbitron', sans-serif;
  color: white;
}

.stars {
  position: absolute;
  width: 100%;
  height: 100%;
}

.stars::after {
  content: "";
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  box-shadow:
    50px 100px white,
    150px 200px white,
    300px 50px white,
    500px 300px white,
    700px 150px white,
    900px 400px white,
    1200px 200px white,
    1400px 100px white,
    1600px 350px white,
    1800px 250px white;
  animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
  from { opacity: 0.3; }
  to { opacity: 1; }
}

.container {
  text-align: center;
  z-index: 1;
  max-width: 450px;
}

h1 {
  font-size: 2.5rem;
  margin-bottom: 20px;
  text-shadow: 0 0 20px #6a5acd;
}

#resultBox {
  margin-top: 20px;
  padding: 25px;
  border-radius: 20px;
  background: rgba(255,255,255,0.12);
  box-shadow: 0 0 25px rgba(0,195,255,0.6);
  animation: fadeIn 1s ease-in-out;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px);} 
  to { opacity: 1; transform: translateY(0);} 
}

button {
  margin-top: 30px;
  padding: 12px 30px;
  font-size: 16px;
  border: none;
  border-radius: 30px;
  background: linear-gradient(45deg, #6a5acd, #00c3ff);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px #00c3ff;
}

.rare {
  color: gold;
  font-size: 22px;
  margin-top: 10px;
  text-shadow: 0 0 10px gold;
}

</style>
</head>

<body>

<div class="stars"></div>

<div class="container">
  <h1>✨ 당신의 찬란한 운세 ✨</h1>

  <div id="resultBox"></div>

  <button onclick="restart()">다시하기</button>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const name = params.get("name") || "당신";

const fortunes = [
  "오늘은 인생샷 찍는 날 📸",
  "뜻밖의 행운이 찾아옵니다 🍀",
  "좋은 인연이 다가옵니다 💕",
  "지금은 쉬어가는 게 최고의 선택 😴",
  "지갑을 조심하세요 💸",
  "소소한 행복이 가득한 하루 🌸",
  "오늘은 도전하면 성공할 확률 UP 🔥",
  "생각지도 못한 기회가 찾아옵니다 ✨"
];

// ⭐ 레어 운세 (5% 확률)
const rareFortunes = [
  "🌌 당신은 오늘 주인공입니다. 모든 일이 잘 풀립니다.",
  "💎 전설급 행운! 오늘 무조건 좋은 일 생김",
  "👑 오늘은 당신이 중심이다. 가는 곳마다 주목받음"
];

const isRare = Math.random() < 0.05;

const randomFortune = isRare
  ? rareFortunes[Math.floor(Math.random() * rareFortunes.length)]
  : fortunes[Math.floor(Math.random() * fortunes.length)];

const stars = "🌟".repeat(Math.floor(Math.random() * 5) + 1);

let rareText = isRare ? "<div class='rare'>🔥 레어 운세 당첨! 🔥</div>" : "";

// 출력
document.getElementById("resultBox").innerHTML = `
  <h2>${name}님의 찬란도</h2>
  <p style="font-size:28px;">${stars}</p>
  <p style="font-size:18px; margin-top:10px;">${randomFortune}</p>
  ${rareText}
`;

function restart() {
  location.href = "index.html";
}
</script>

</body>
</html>
